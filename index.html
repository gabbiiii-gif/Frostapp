<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- Viewport otimizado para mobile: sem zoom automático em inputs -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- CSP aplicado via servidor em produção; em dev o Vite precisa de ws: e eval para HMR -->
    <title>FrostERP</title>

    <!-- PWA: instalação e aparência nativa no Android/iOS -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FrostERP" />
    <!-- Favicon: SVG vetorial estatico (azul). NAO usar <style>/@media dentro do SVG:
         o Chrome quebra o render do favicon nesse caso (vira quadrado azul).
         PNG + ICO de fallback p/ browsers sem suporte a SVG icon. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=7" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png?v=7" sizes="96x96" />
    <link rel="shortcut icon" href="/favicon.ico?v=7" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=7" />
    <!-- Troca favicon da aba: azul no tema claro, branco no escuro. Externo por causa do CSP. -->
    <script src="/favicon-swap.js?v=8" defer></script>
    <!-- Manifest PWA: injetado automaticamente pelo vite-plugin-pwa no build -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

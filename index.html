<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- Viewport otimizado para mobile: sem zoom automático em inputs -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- CSP aplicado via servidor em produção; em dev o Vite precisa de ws: e eval para HMR -->
    <title>FrostERP — Sistema de Gestão para Refrigeração</title>

    <!-- ============ SEO ============ -->
    <!-- App e privado (login): noindex p/ nao competir com a landing nem indexar
         pagina de login. follow mantido. Marketing/ranqueamento fica em frosterp.com.br. -->
    <meta name="robots" content="noindex, follow" />
    <meta name="description" content="Acesse o FrostERP — sistema de gestão para empresas de refrigeração: ordens de serviço, agenda, financeiro e estoque." />
    <link rel="canonical" href="https://app.frosterp.com.br/" />
    <meta name="author" content="FrostERP" />
    <!-- Open Graph (preview ao compartilhar o link do app) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FrostERP" />
    <meta property="og:title" content="FrostERP — Sistema de Gestão para Refrigeração" />
    <meta property="og:description" content="Acesse seu painel: OS, agenda de manutenção, financeiro e estoque num sistema só." />
    <meta property="og:url" content="https://app.frosterp.com.br/" />
    <meta property="og:image" content="https://app.frosterp.com.br/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="FrostERP — Sistema de gestão para empresas de refrigeração" />
    <meta property="og:locale" content="pt_BR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FrostERP — Sistema de Gestão para Refrigeração" />
    <meta name="twitter:description" content="Acesse seu painel: OS, agenda de manutenção, financeiro e estoque num sistema só." />
    <meta name="twitter:image" content="https://app.frosterp.com.br/og-image.png" />
    <!-- ============ /SEO ============ -->

    <!-- PWA: instalação e aparência nativa no Android/iOS -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FrostERP" />
    <!-- Favicon: SVG vetorial estatico (azul). NAO usar <style>/@media dentro do SVG:
         o Chrome quebra o render do favicon nesse caso (vira quadrado azul).
         PNG + ICO de fallback p/ browsers sem suporte a SVG icon. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=7" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png?v=7" sizes="96x96" />
    <link rel="shortcut icon" href="/favicon.ico?v=7" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=8" />
    <!-- Troca favicon da aba: azul no tema claro, branco no escuro. Externo por causa do CSP. -->
    <script src="/favicon-swap.js?v=8" defer></script>
    <!-- Manifest PWA: injetado automaticamente pelo vite-plugin-pwa no build -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

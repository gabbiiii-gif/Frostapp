<svg viewBox="0 0 680 680" width="680" height="680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>FrostERP</title>
  <g stroke="#1B8FE8" stroke-linecap="round">
    <!-- 6 braços principais — centro 340,340, raio 240 -->
    <line x1="340" y1="340" x2="340" y2="100" stroke-width="5"/>
    <line x1="340" y1="340" x2="548" y2="460" stroke-width="5"/>
    <line x1="340" y1="340" x2="548" y2="220" stroke-width="5"/>
    <line x1="340" y1="340" x2="340" y2="580" stroke-width="5"/>
    <line x1="340" y1="340" x2="132" y2="460" stroke-width="5"/>
    <line x1="340" y1="340" x2="132" y2="220" stroke-width="5"/>
    <!-- Braço 0° (cima) — ramificações nível 1 -->
    <line x1="340" y1="240" x2="302" y2="202" stroke-width="3"/>
    <line x1="340" y1="240" x2="378" y2="202" stroke-width="3"/>
    <!-- ramificações nível 2 -->
    <line x1="340" y1="178" x2="316" y2="154" stroke-width="2"/>
    <line x1="340" y1="178" x2="364" y2="154" stroke-width="2"/>
    <!-- ramificações nível 3 (perto da ponta) -->
    <line x1="340" y1="128" x2="324" y2="112" stroke-width="1.5"/>
    <line x1="340" y1="128" x2="356" y2="112" stroke-width="1.5"/>
    <!-- Braço 60° (dir-cima) -->
    <line x1="410" y1="300" x2="410" y2="262" stroke-width="3"/>
    <line x1="410" y1="300" x2="448" y2="278" stroke-width="3"/>
    <line x1="444" y1="280" x2="444" y2="248" stroke-width="2"/>
    <line x1="444" y1="280" x2="472" y2="264" stroke-width="2"/>
    <line x1="470" y1="264" x2="470" y2="240" stroke-width="1.5"/>
    <line x1="470" y1="264" x2="492" y2="252" stroke-width="1.5"/>
    <!-- Braço 120° (dir-baixo) -->
    <line x1="410" y1="380" x2="448" y2="402" stroke-width="3"/>
    <line x1="410" y1="380" x2="410" y2="418" stroke-width="3"/>
    <line x1="444" y1="400" x2="472" y2="416" stroke-width="2"/>
    <line x1="444" y1="400" x2="444" y2="432" stroke-width="2"/>
    <line x1="470" y1="416" x2="492" y2="428" stroke-width="1.5"/>
    <line x1="470" y1="416" x2="470" y2="440" stroke-width="1.5"/>
    <!-- Braço 180° (baixo) -->
    <line x1="340" y1="440" x2="378" y2="478" stroke-width="3"/>
    <line x1="340" y1="440" x2="302" y2="478" stroke-width="3"/>
    <line x1="340" y1="502" x2="364" y2="526" stroke-width="2"/>
    <line x1="340" y1="502" x2="316" y2="526" stroke-width="2"/>
    <line x1="340" y1="552" x2="356" y2="568" stroke-width="1.5"/>
    <line x1="340" y1="552" x2="324" y2="568" stroke-width="1.5"/>
    <!-- Braço 240° (esq-baixo) -->
    <line x1="270" y1="380" x2="270" y2="418" stroke-width="3"/>
    <line x1="270" y1="380" x2="232" y2="402" stroke-width="3"/>
    <line x1="236" y1="400" x2="236" y2="432" stroke-width="2"/>
    <line x1="236" y1="400" x2="208" y2="416" stroke-width="2"/>
    <line x1="210" y1="416" x2="210" y2="440" stroke-width="1.5"/>
    <line x1="210" y1="416" x2="188" y2="428" stroke-width="1.5"/>
    <!-- Braço 300° (esq-cima) -->
    <line x1="270" y1="300" x2="232" y2="278" stroke-width="3"/>
    <line x1="270" y1="300" x2="270" y2="262" stroke-width="3"/>
    <line x1="236" y1="280" x2="208" y2="264" stroke-width="2"/>
    <line x1="236" y1="280" x2="236" y2="248" stroke-width="2"/>
    <line x1="210" y1="264" x2="188" y2="252" stroke-width="1.5"/>
    <line x1="210" y1="264" x2="210" y2="240" stroke-width="1.5"/>
  </g>
  <!-- Pontas dos braços -->
  <g fill="#1B8FE8">
    <circle cx="340" cy="98" r="6"/>
    <circle cx="550" cy="218" r="6"/>
    <circle cx="550" cy="462" r="6"/>
    <circle cx="340" cy="582" r="6"/>
    <circle cx="130" cy="462" r="6"/>
    <circle cx="130" cy="218" r="6"/>
  </g>
  <!-- Losangos nível 1 -->
  <g fill="#2272CC">
    <polygon points="340,198 332,210 340,222 348,210"/>
    <polygon points="416,258 408,268 416,278 424,268"/>
    <polygon points="416,402 408,412 416,422 424,412"/>
    <polygon points="340,458 332,470 340,482 348,470"/>
    <polygon points="264,402 256,412 264,422 272,412"/>
    <polygon points="264,258 256,268 264,278 272,268"/>
  </g>
  <!-- Losangos nível 2 (menores, mais externos) -->
  <g fill="#4A90D9" opacity="0.8">
    <polygon points="340,152 334,160 340,168 346,160"/>
    <polygon points="450,272 444,280 450,288 456,280"/>
    <polygon points="450,408 444,400 450,392 456,400"/>
    <polygon points="340,528 334,520 340,512 346,520"/>
    <polygon points="230,408 224,400 230,392 236,400"/>
    <polygon points="230,272 224,280 230,288 236,280"/>
  </g>
  <!-- Hexágono central -->
  <polygon points="340,296 374,315 374,363 340,382 306,363 306,315" fill="#0A2A6E" stroke="#6CB4F0" stroke-width="2"/>
  <!-- Círculo central -->
  <circle cx="340" cy="340" r="28" fill="#1B8FE8"/>
  <circle cx="340" cy="340" r="14" fill="#E0F4FF"/>
  <circle cx="340" cy="340" r="36" fill="none" stroke="#6CB4F0" stroke-width="1.2" opacity="0.5"/>
</svg>
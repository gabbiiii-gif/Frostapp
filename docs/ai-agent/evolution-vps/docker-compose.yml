version: "3.8"

# Stack: Evolution API + Postgres (pra Evolution) + Caddy (HTTPS automático via Let's Encrypt)
# Postgres do Supabase NÃO é usado aqui — a Evolution precisa do próprio Postgres pra
# armazenar instâncias/sessões (NÃO confundir com o banco do FrostERP).

services:
  evolution:
    image: atendai/evolution-api:v2.1.1
    container_name: evolution
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      # URL pública (substituída no Caddyfile pelo domínio HTTPS)
      SERVER_URL: ${EVOLUTION_PUBLIC_URL}
      # Chave de admin da API — troque por uma string aleatória forte
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      # Postgres (interno do container abaixo)
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${POSTGRES_PASSWORD}@evolution-db:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      # Cache em memória (sem Redis pra simplificar)
      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"
      # Webhook global → todas as instâncias mandam evento pro N8N
      WEBHOOK_GLOBAL_URL: ${N8N_WEBHOOK_URL}
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      # Só nos importa msg recebida
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "false"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"
      # Idioma das respostas
      LANGUAGE: pt-BR
      # CORS aberto (Caddy é a barreira)
      CORS_ORIGIN: "*"
      CORS_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
      CORS_CREDENTIALS: "true"
      # Logs
      LOG_LEVEL: "ERROR,WARN,INFO"
      LOG_COLOR: "true"
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - evolution-db
    networks:
      - app

  evolution-db:
    image: postgres:16-alpine
    container_name: evolution-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data
    networks:
      - app

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      EVOLUTION_DOMAIN: ${EVOLUTION_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - evolution
    networks:
      - app

volumes:
  evolution_instances:
  evolution_pgdata:
  caddy_data:
  caddy_config:

networks:
  app:
    driver: bridge

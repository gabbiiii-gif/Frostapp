  </g>

  <line x1="286" y1="72" x2="286" y2="128" stroke="#2F62B0" stroke-width="1.4" style="fill:rgb(0, 0, 0);stroke:rgb(47, 98, 176);color:rgb(255, 255, 255);stroke-width:1.4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <text x="310" y="113" font-family="'Liberation Sans','Segoe UI',sans-serif" font-size="40" font-weight="700" letter-spacing="0.5" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Liberation Sans&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:40px;font-weight:700;text-anchor:start;dominant-baseline:auto">
    <tspan fill="#FFFFFF" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Liberation Sans&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:40px;font-weight:700;text-anchor:start;dominant-baseline:auto">FROST</tspan><tspan fill="#1B8FE8" font-weight="400" style="fill:rgb(27, 143, 232);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Liberation Sans&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:40px;font-weight:400;text-anchor:start;dominant-baseline:auto">ERP</tspan>
